# 五常同城本地生活服务平台 - 配置文件
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug | release | test

database:
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-5432}"
  user: "${DB_USER:-postgres}"
  password: "${DB_PASSWORD:-postgres}"
  dbname: "${DB_NAME:-wuchang_tongcheng}"
  sslmode: "disable"
  timezone: "Asia/Shanghai"
  max_open_conns: 100
  max_idle_conns: 10
  max_lifetime: 3600

redis:
  host: "${REDIS_HOST:-localhost}"
  port: "${REDIS_PORT:-6379}"
  password: "${REDIS_PASSWORD:-}"
  db: 0
  pool_size: 10
  default_expiration: 3600

logger:
  level: "info"
  filename: "logs/app.log"
  max_size: 100
  max_backups: 3
  max_age: 30
  compress: true
  console: true

jwt:
  secret: "${JWT_SECRET:-wuchang-tongcheng-jwt-secret-key-2024}"
  expire: 72  # 小时
  issuer: "wuchang-tongcheng"

rabbitmq:
  host: "${RABBITMQ_HOST:-localhost}"
  port: "${RABBITMQ_PORT:-5672}"
  user: "${RABBITMQ_USER:-guest}"
  password: "${RABBITMQ_PASSWORD:-guest}"
  vhost: "/"

elasticsearch:
  addresses:
    - "${ES_ADDR:-http://localhost:9200}"
  username: "${ES_USER:-}"
  password: "${ES_PASSWORD:-}"

storage:
  type: "${STORAGE_TYPE:-local}"  # local | qiniu | minio
  access_key: "${STORAGE_ACCESS_KEY:-}"
  secret_key: "${STORAGE_SECRET_KEY:-}"
  bucket: "${STORAGE_BUCKET:-wuchang-tongcheng}"
  domain: "${STORAGE_DOMAIN:-}"
  region: "${STORAGE_REGION:-}"

map:
  type: "${MAP_TYPE:-amap}"  # amap | baidu
  key: "${MAP_KEY:-}"