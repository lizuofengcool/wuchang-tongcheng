# 五常同城本地生活服务平台 - 配置文件
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "wuchang_tongcheng"
  sslmode: "disable"
  timezone: "Asia/Shanghai"
  max_open_conns: 100
  max_idle_conns: 10
  max_lifetime: 3600

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  default_expiration: 3600

logger:
  level: "debug"
  filename: "logs/app.log"
  max_size: 100
  max_backups: 3
  max_age: 30
  compress: false
  console: true

jwt:
  secret: "wuchang-tongcheng-jwt-secret-key-2024"
  expire: 72
  issuer: "wuchang-tongcheng"

rabbitmq:
  host: "localhost"
  port: 5672
  user: "guest"
  password: "guest"
  vhost: "/"

elasticsearch:
  addresses:
    - "http://localhost:9200"
  username: ""
  password: ""

storage:
  type: "local"
  access_key: ""
  secret_key: ""
  bucket: "wuchang-tongcheng"
  domain: ""
  region: ""

map:
  type: "amap"
  key: ""