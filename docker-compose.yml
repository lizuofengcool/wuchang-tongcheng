version: "3.8"

services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: wctc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wuchang_tongcheng
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: wctc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Elasticsearch 搜索引擎（可选，不启动也可降级运行） =====
  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: wctc-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ===== RabbitMQ 消息队列（可选，不启动也可降级运行） =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wctc-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ===== 后端服务 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wctc-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: wuchang_tongcheng
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      ES_ADDR: http://elasticsearch:9200
      JWT_SECRET: wuchang-tongcheng-production-secret
      STORAGE_TYPE: local
      GIN_MODE: release
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Nginx（PC 门户 + 管理后台 + 静态文件） =====
  nginx:
    image: nginx:alpine
    container_name: wctc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html/admin:ro
      - ./frontend/pc/out:/usr/share/nginx/html/pc:ro
      - ./frontend/miniapp/dist/build/h5:/usr/share/nginx/html/h5:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  es_data:
  rabbitmq_data:
  uploads_data: